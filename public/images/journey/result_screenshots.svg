<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="width: 100%; height: 100%; display: block;">
  <rect width="400" height="300" fill="#080503" rx="16" />
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6100" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glowGrad)" rx="16" />
  
  
      <!-- Screen with Grade metrics -->
      <rect x="80" y="75" width="240" height="140" fill="none" stroke="#ff6100" stroke-width="2" rx="6"/>
      <!-- Table rows -->
      <line x1="95" y1="110" x2="305" y2="110" stroke="#ff9a4d" stroke-width="1.5"/>
      <line x1="95" y1="135" x2="305" y2="135" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1"/>
      <line x1="95" y1="160" x2="305" y2="160" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1"/>
      <line x1="95" y1="185" x2="305" y2="185" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1"/>
      <!-- Grade text -->
      <text x="110" y="100" fill="#ff6100" font-size="9" font-family="sans-serif" font-weight="700">SUBJECT</text>
      <text x="280" y="100" fill="#ff6100" font-size="9" font-family="sans-serif" font-weight="700">GRADE</text>
      <text x="110" y="125" fill="#ffffff" font-size="9" font-family="sans-serif">Artificial Intelligence</text>
      <text x="285" y="125" fill="#ff9a4d" font-size="10" font-weight="900" font-family="sans-serif">O</text>
      <text x="110" y="150" fill="#ffffff" font-size="9" font-family="sans-serif">Machine Learning</text>
      <text x="285" y="150" fill="#ff9a4d" font-size="10" font-weight="900" font-family="sans-serif">A+</text>
      <text x="110" y="175" fill="#ffffff" font-size="9" font-family="sans-serif">Data Science</text>
      <text x="285" y="175" fill="#ff9a4d" font-size="10" font-weight="900" font-family="sans-serif">O</text>
    

  <!-- Banner text overlay at top -->
  <text x="20" y="35" fill="rgba(255,255,255,0.25)" font-size="10" font-family="monospace">🏆</text>
  <text x="380" y="35" fill="rgba(255, 97, 0, 0.3)" font-size="10" font-family="monospace" text-anchor="end">RESULT SCREENSHOTS</text>
</svg>