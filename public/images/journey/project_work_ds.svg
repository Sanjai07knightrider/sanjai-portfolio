<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="width: 100%; height: 100%; display: block;">
  <rect width="400" height="300" fill="#080503" rx="16" />
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6100" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glowGrad)" rx="16" />
  
  
      <!-- Linear Regression / scatter plot -->
      <rect x="90" y="70" width="220" height="150" fill="none" stroke="#ff6100" stroke-width="2" rx="8"/>
      <!-- Scatter points -->
      <circle cx="120" cy="170" r="4" fill="#ff9a4d"/>
      <circle cx="140" cy="160" r="4" fill="#ff9a4d"/>
      <circle cx="160" cy="130" r="4" fill="#ff9a4d"/>
      <circle cx="180" cy="140" r="4" fill="#ff9a4d"/>
      <circle cx="200" cy="110" r="4" fill="#ff9a4d"/>
      <circle cx="220" cy="100" r="4" fill="#ff9a4d"/>
      <circle cx="240" cy="85" r="4" fill="#ff9a4d"/>
      <!-- Best fit line -->
      <line x1="100" y1="185" x2="280" y2="70" stroke="#ff6100" stroke-width="2.5"/>
      <line x1="100" y1="195" x2="300" y2="195" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <line x1="100" y1="75" x2="100" y2="195" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    

  <!-- Banner text overlay at top -->
  <text x="20" y="35" fill="rgba(255,255,255,0.25)" font-size="10" font-family="monospace">📊</text>
  <text x="380" y="35" fill="rgba(255, 97, 0, 0.3)" font-size="10" font-family="monospace" text-anchor="end">PROJECT WORK</text>
</svg>