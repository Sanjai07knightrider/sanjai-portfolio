<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="width: 100%; height: 100%; display: block;">
  <rect width="400" height="300" fill="#080503" rx="16" />
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6100" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glowGrad)" rx="16" />
  
  
      <!-- Code Editor Screen -->
      <rect x="80" y="70" width="240" height="150" fill="none" stroke="#ff6100" stroke-width="2.5" rx="8"/>
      <rect x="80" y="70" width="240" height="25" fill="rgba(255, 97, 0, 0.15)" stroke="#ff6100" stroke-width="1"/>
      <circle cx="95" cy="82" r="4" fill="#ff4d4d"/>
      <circle cx="107" cy="82" r="4" fill="#ffb84d"/>
      <circle cx="119" cy="82" r="4" fill="#4dff4d"/>
      <!-- Code Text Lines -->
      <line x1="100" y1="115" x2="180" y2="115" stroke="#ff9a4d" stroke-width="3" stroke-linecap="round"/>
      <line x1="120" y1="135" x2="220" y2="135" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <line x1="140" y1="155" x2="280" y2="155" stroke="#ff6100" stroke-width="3" stroke-linecap="round"/>
      <line x1="120" y1="175" x2="190" y2="175" stroke="#ff9a4d" stroke-width="3" stroke-linecap="round"/>
      <line x1="100" y1="195" x2="150" y2="195" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    

  <!-- Banner text overlay at top -->
  <text x="20" y="35" fill="rgba(255,255,255,0.25)" font-size="10" font-family="monospace">🏛️</text>
  <text x="380" y="35" fill="rgba(255, 97, 0, 0.3)" font-size="10" font-family="monospace" text-anchor="end">CODING SESSIONS</text>
</svg>