<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="width: 100%; height: 100%; display: block;">
  <rect width="400" height="300" fill="#080503" rx="16" />
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6100" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glowGrad)" rx="16" />
  
  
      <!-- Classroom Board & Desk -->
      <rect x="90" y="70" width="220" height="110" fill="rgba(255, 97, 0, 0.05)" stroke="#ff6100" stroke-width="2" rx="6"/>
      <line x1="90" y1="160" x2="310" y2="160" stroke="#ff6100" stroke-width="1.5"/>
      <!-- chalk formula -->
      <text x="200" y="115" fill="#ff9a4d" font-size="14" font-family="monospace" text-anchor="middle">f(x) = ∫ (3x² + 2x) dx</text>
      <text x="200" y="135" fill="rgba(255, 255, 255, 0.6)" font-size="12" font-family="monospace" text-anchor="middle">= x³ + x² + C</text>
      <!-- Desk -->
      <polygon points="120,230 280,230 300,260 100,260" fill="rgba(255, 97, 0, 0.1)" stroke="#ff6100" stroke-width="2" />
      <line x1="130" y1="230" x2="130" y2="260" stroke="#ff6100" stroke-width="2"/>
      <line x1="270" y1="230" x2="270" y2="260" stroke="#ff6100" stroke-width="2"/>
      <!-- Book -->
      <rect x="180" y="215" width="40" height="15" fill="none" stroke="#ff9a4d" stroke-width="1.5" rx="2"/>
      <line x1="200" y1="215" x2="200" y2="230" stroke="#ff9a4d" stroke-width="1.5"/>
    

  <!-- Banner text overlay at top -->
  <text x="20" y="35" fill="rgba(255,255,255,0.25)" font-size="10" font-family="monospace">🏫</text>
  <text x="380" y="35" fill="rgba(255, 97, 0, 0.3)" font-size="10" font-family="monospace" text-anchor="end">CLASSROOM</text>
</svg>