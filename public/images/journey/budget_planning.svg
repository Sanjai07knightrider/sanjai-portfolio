<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="width: 100%; height: 100%; display: block;">
  <rect width="400" height="300" fill="#080503" rx="16" />
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6100" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glowGrad)" rx="16" />
  
  
      <!-- Analytics charts and dollar badge -->
      <rect x="90" y="70" width="220" height="150" fill="none" stroke="#ff6100" stroke-width="2.5" rx="8"/>
      <!-- Bar Charts -->
      <rect x="110" y="140" width="16" height="50" fill="none" stroke="#ff9a4d" stroke-width="2"/>
      <rect x="140" y="110" width="16" height="80" fill="rgba(255, 97, 0, 0.15)" stroke="#ff6100" stroke-width="2"/>
      <rect x="170" y="130" width="16" height="60" fill="none" stroke="#ff9a4d" stroke-width="2"/>
      <!-- Pie Chart -->
      <circle cx="245" cy="140" r="30" fill="none" stroke="#ff6100" stroke-width="2" />
      <path d="M245,140 L266,119 A30,30 0 0,1 275,140 Z" fill="#ff9a4d"/>
      <line x1="100" y1="190" x2="300" y2="190" stroke="#ff6100" stroke-width="1.5"/>
    

  <!-- Banner text overlay at top -->
  <text x="20" y="35" fill="rgba(255,255,255,0.25)" font-size="10" font-family="monospace">💼</text>
  <text x="380" y="35" fill="rgba(255, 97, 0, 0.3)" font-size="10" font-family="monospace" text-anchor="end">BUDGET PLANNING</text>
</svg>